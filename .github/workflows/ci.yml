name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app

      - name: Test
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=75

      - name: Dependency audit
        run: uv run pip-audit --progress-spinner off

      - name: Mock adversarial eval
        run: uv run python -m app.evals.run_eval --mock

      - name: Golden smoke eval
        run: uv run python -m app.evals.run_golden_eval --split smoke
